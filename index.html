<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Brian Barber</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: blue;
      text-align: center;
      background: background: url('https://images.unsplash.com/photo-1503951458645-643d53d1c2c4') no-repeat center/cover;
    }

    .overlay {
      background: rgba(0,0,0,0.7);
      min-height: 100vh;
      padding: 20px;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
    }

    .services {
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      margin: 10px auto;
      padding: 15px;
      width: 250px;
      border-radius: 10px;
      backdrop-filter: blur(5px);
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      background: gold;
      color: black;
      padding: 15px 25px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
    }

    .btn:hover {
      background: orange;
    }
  </style>
</head>

<body>

<div class="overlay">

<header>
  <h1>Brian Barber</h1>
  <p>Estilo, atitude e precisão</p>
</header>

<section class="services">
  <h2>Serviços</h2>

  <div class="card">Corte - R$ 40</div>
  <div class="card">Barba - R$ 30</div>
  <div class="card">Corte + Barba - R$ 70</div>

  <a class="btn" href="https://wa.me/5531982560088">
    Agendar pelo WhatsApp
  </a>
</section>

</div>

</body>
</html>
